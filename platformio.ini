[platformio]
default_envs = disco_f407vg

[env:disco_f407vg]
platform        = ststm32
board           = disco_f407vg
framework       = stm32cube
upload_protocol = stlink
debug_tool      = stlink
build_flags =
    -Iinclude
    -DSTM32F407xx
    -DUSE_HAL_DRIVER
    -DHSE_VALUE=8000000
    -Wl,-u,_printf_float
; Strict warnings for our own code only; STM32 HAL framework has
; unused-parameter warnings we can't fix.
build_src_flags =
    -Wall -Wextra -Werror
build_unflags =
    -Os
debug_build_flags = -O0 -ggdb3

[env:native]
platform = native
build_flags =
    -std=c11 -Wall -Wextra
    -Ilib/mpu6050 -Ilib/imu_filter -Iinclude
    -lm
test_framework = unity
lib_compat_mode = off
lib_ignore = i2c_stm32
